name: frontend CI/CD

on:
  push:
    branches: [ "master" ] # 또는 실제 사용하는 브랜치명(main 등)으로 수정하세요.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './package.json'

    - name: Create .env file
      run: |
        echo "VITE_RECAPTCHA_SITE_KEY=${{ secrets.VITE_RECAPTCHA_SITE_KEY }}" > .env
        echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> .env

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Transfer Artifacts to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        # 빌드된 dist 폴더와 설정 파일들을 전송합니다.
        source: "dist/,Dockerfile,nginx.conf"
        target: "~/teamproject/frontend"
        strip_components: 0

    - name: Deploy on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd ~/teamproject
          # 컴포즈를 통해 프론트엔드 컨테이너만 빌드 및 재시작
          sudo docker compose up --build -d frontend
