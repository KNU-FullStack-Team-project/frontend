server {
    listen 80;
    server_name mockinvest.kro.kr localhost;

    # HTTP로 접속하면 HTTPS로 강제 이동 (리다이렉트)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mockinvest.kro.kr;

    # Let's Encrypt에서 발급받은 인증서 경로
    ssl_certificate /etc/letsencrypt/live/mockinvest.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mockinvest.kro.kr/privkey.pem;

    # 1. 프론트엔드 정적 파일 서빙
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. 백엔드 API 프록시 설정
    location /api {
        proxy_pass http://my-backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # SSE (Server-Sent Events) 지원 설정
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }
}
